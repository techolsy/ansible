---
- name: Default vm setup
  hosts: vm
  gather_facts: true
  vars:

    px_api_defaults: &px_api_defaults
      api_user: "{{ px_api_user }}"
      api_token_id: "{{ px_api_token_id }}"
      api_token_secret: "{{ px_api_token_secret }}"
      api_host: "{{ px_api_host }}"

  module_defaults:

    community.proxmox.proxmox_disk:
      <<: *px_api_defaults

    community.proxmox.proxmox_vm_info:
      <<: *px_api_defaults

  handlers:

    - name: Copy motd-datestamp
      ansible.builtin.copy:
        dest: /etc/motd
        mode: 0644
        content: |
          Server setup date: {{ now(utc=true, fmt='%Y-%m-%d') }}

    - name: Zabbix set-maintenance
      ansible.builtin.include_tasks:
        file: tasks/zabbix/set-maintenance.yml
      vars:
        maintenance_message: "New host: {{ ansible_fqdn }}"
        maintenance_time: 15

    - name: Restart zabbix-agent
      ansible.builtin.systemd_service:
        name: zabbix-agent2
        state: restarted

    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 300

  tasks:

    - ansible.builtin.include_tasks:
        file: tasks/swap/add.yml
      when: ansible_facts["memory_mb"]["swap"]["total"] == 0

    - ansible.builtin.include_tasks:
        file: tasks/disk/add.yml
      when: extra_disks is defined
      loop: "{{ extra_disks }}"
      loop_control:
        loop_var: _disk

    - name: Make sure cloud-init is absent
      ansible.builtin.apt:
        purge: true
        name: cloud-init
        state: absent

    - name: Make sure /etc/cloud is absent
      ansible.builtin.file:
        dest: /etc/cloud
        state: absent

    - name: Make sure dangling cloud-init files is removed
      community.general.file_remove:
        path: "{{ item.path }}"
        pattern: "{{ item.pattern }}"
      loop:
        - path: /etc/network/interfaces.d
          pattern: "*cloud-init"
        - path: /var/log
          pattern: "cloud-init*"

    - name: Make sure /etc/network/interfaces is absent
      ansible.builtin.file:
        dest: /etc/network/interfaces
        state: absent

    - name: Gather apt packages as facts
      techolsy.exmod.apt_package_facts:

    - name: Copy resolv.conf
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        mode: 0644
        content: |
          domain {{ local_domain }}
          search {{ local_domain }}
          nameserver {{ nameserver1 }}
          nameserver {{ nameserver2 }}
      when: '"systemd-resolved" not in ansible_facts.apt_packages'

    - name: Copy systemd network interface
      ansible.builtin.copy:
        content: "{{ _content | community.general.to_ini }}"
        dest: /etc/systemd/network/{{ ansible_default_ipv4.interface }}.network
        mode: 0644
      vars:
        _content:
          Match:
            Name: "{{ ansible_default_ipv4.interface }}"
          Network:
            Address: "{{ ansible_inventory_ip }}/{{ ip4_cidr }}"
            Gateway: "{{ ip4_gw }}"
            DNS: "{{ nameserver1 }} {{ nameserver2 }}"
      when: "'dns' not in group_names"

    - name: Make sure networkd is enabled and running
      ansible.builtin.systemd_service:
        name: systemd-networkd.service
        enabled: true
        state: started
      notify: Reboot

    - name: Make sure default packages are installed
      ansible.builtin.apt:
        pkg:
          - psmisc
          - net-tools
          - cloud-guest-utils
          - curl
          - ncdu
          - htop
          - iotop
          - vim
          - tmux
          - gnupg
          - systemd-resolved
        state: present
        update_cache: true

    - name: Make sure template users is absent
      ansible.builtin.user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop: "{{ template_users }}"

    - name: Make sure root password is set
      ansible.builtin.user:
        name: root
        password: "{{ root_password }}"

    - ansible.builtin.include_tasks:
        file: tasks/zabbix/install-agent.yml
      when: '"zabbix-agent2" not in ansible_facts.apt_packages'

    - name: Copy zabbix config file
      ansible.builtin.copy:
        dest: /etc/zabbix/zabbix_agent2.conf
        mode: 0644
        content: |
          PidFile=/var/run/zabbix/zabbix_agent2.pid
          LogFile=/var/log/zabbix/zabbix_agent2.log
          LogFileSize=0
          Server={{ zabbix_host }}
          ServerActive={{ zabbix_host }}
          Hostname={{ ansible_hostname }}
          Include=/etc/zabbix/zabbix_agent2.d/*.conf
          PluginSocket=/run/zabbix/agent.plugin.sock
          ControlSocket=/run/zabbix/agent.sock
          Include=./zabbix_agent2.d/plugins.d/*.conf
          AllowKey=system.run[*]
      notify: Restart zabbix-agent
      when: '"zabbix-server-mysql" not in ansible_facts.apt_packages'

    - name: Copy hotplug rules
      ansible.builtin.copy:
        dest: /lib/udev/rules.d/80-hotplug-cpu-mem.rules
        content: |
          SUBSYSTEM=="cpu", ACTION=="add", TEST=="online", ATTR{online}=="0", ATTR{online}="1"
          SUBSYSTEM=="memory", ACTION=="add", TEST=="state", ATTR{state}=="offline", ATTR{state}="online"
        mode: 0644
      notify: Reboot

    - name: Copy root certificate
      ansible.builtin.copy:
        dest: /usr/local/share/ca-certificates/{{ item.name }}
        mode: 0644
        content: "{{ item.content }}"
      loop: "{{ root_certificates }}"
      register: copy_root_certs

    - name: Update ca trust # noqa no-handler
      ansible.builtin.command:
        cmd: update-ca-certificates
      changed_when: false
      when: copy_root_certs.changed

    - ansible.builtin.import_role:
        name: techolsy.infra.setup
      vars:
        setup_action: vm

    - name: Check if node exporter exists
      ansible.builtin.stat:
        dest: /usr/local/bin/node_exporter
      register: _node_exporter

    - ansible.builtin.include_tasks:
        file: tasks/node-exporter/install.yml
      when: not _node_exporter.stat.exists

    - ansible.builtin.include_tasks:
        file: tasks/prom/update-conf.yml

    - name: Add setup mark
      ansible.builtin.command:
        cmd: touch /root/.ansible-setup-done
      args:
        creates: /root/.ansible-setup-done
      notify: Copy motd-datestamp
